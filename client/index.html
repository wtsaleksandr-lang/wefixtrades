<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0F14" />
    <title>WeFixTrades — Quote calculators + AI receptionist for trades</title>
    <meta name="description" content="The all-in-one platform for plumbers, electricians, HVAC, roofers, and trade businesses: embeddable quote calculators, 24/7 AI lead handling, Google Maps SEO, and reputation tools." />
    <!-- SEO Wave A — global OG / Twitter defaults. Per-page <PageMeta>
         overrides title, description, og:title, og:description, og:image,
         og:url, twitter:title, twitter:description, twitter:image, and
         the <link rel="canonical"> on every route mount. -->
    <meta name="robots" content="index, follow" />
    <meta property="og:site_name" content="WeFixTrades" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://wefixtrades.com/brand/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@wefixtrades" />
    <!-- No static <link rel="canonical">. PageMeta sets the canonical
         per-route on hydration; emitting a static `/` here makes
         non-JS-rendering crawlers (Bing's primary index, social-card
         scrapers, LLM crawlers) treat every URL as a duplicate of the
         homepage. Better to ship no canonical than a wrong one. -->
    <!-- Baseline Organization + WebSite JSON-LD so non-JS crawlers can
         see the brand on any URL even before route-level scripts hydrate.
         Per-page <PageMeta> can additionally inject Product/FAQ/Breadcrumb
         schemas via data-jsonld="page" without conflicting with these. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "WeFixTrades",
        "url": "https://wefixtrades.com",
        "logo": "https://wefixtrades.com/brand/icon.svg",
        "sameAs": [],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "Customer Support",
          "url": "https://wefixtrades.com/contact"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "WeFixTrades",
        "url": "https://wefixtrades.com"
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Wave 45 — fonts trimmed to those actually used on marketing pages:
      Inter (everywhere), Space Grotesk (marketing chrome + diagrams),
      DM Mono (small-caps eyebrows + chip labels). The wizard / quote
      calculator widget loads its own font set dynamically via the
      widget's runtime so customers picking Manrope, Syne, Outfit,
      Bebas, Plus Jakarta, Playfair, IBM Plex, or Sora still get them
      on the calculator surface — they just don't render-block on the
      homepage where they were never used. Saves ~9 font-file requests
      + a render-blocking CSS round-trip on every marketing page load.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Self-hosted Satoshi + Geist. @font-face declarations live in
         client/src/index.css. Preload the most-critical weight (Satoshi 400
         body text) so the first paint is hinted; remaining weights load
         lazily via the stylesheet @font-face rules. -->
    <link rel="preload" href="/fonts/satoshi-400.woff2" as="font" type="font/woff2" crossorigin>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

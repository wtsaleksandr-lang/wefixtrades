<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0F14" />
    <title>WeFixTrades — Quote calculators + AI receptionist for trades</title>
    <meta name="description" content="The all-in-one platform for plumbers, electricians, HVAC, roofers, and trade businesses: embeddable quote calculators, 24/7 AI lead handling, Google Maps SEO, and reputation tools." />
    <!-- SEO Wave A — global OG / Twitter defaults. Per-page <PageMeta>
         overrides title, description, og:title, og:description, og:image,
         og:url, twitter:title, twitter:description, twitter:image, and
         the <link rel="canonical"> on every route mount. -->
    <meta property="og:site_name" content="WeFixTrades" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://wefixtrades.com/brand/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@wefixtrades" />
    <link rel="canonical" href="https://wefixtrades.com/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&family=IBM+Plex+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Self-hosted Satoshi + Geist. @font-face declarations live in
         client/src/index.css. Preload the most-critical weight (Satoshi 400
         body text) so the first paint is hinted; remaining weights load
         lazily via the stylesheet @font-face rules. -->
    <link rel="preload" href="/fonts/satoshi-400.woff2" as="font" type="font/woff2" crossorigin>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

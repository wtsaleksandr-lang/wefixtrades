name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run check:copilot-forms
      - name: Hardcoded color guard
        run: npm run check:hardcoded-colors
      - name: Layout rules guard
        run: npm run check:layout-rules
      - run: npm run check:migrations
      - name: Migration SQL destructive-op guard
        run: npm run check:migration-safety
      - name: Forbid schema-push command in any deploy path
        run: npm run check:no-db-push-in-prod
      - name: Forbid GA4 Measurement Protocol secret in client bundle
        run: npm run check:no-mp-secret-in-client
      - name: Drizzle schema-drift check
        run: npm run check:schema-drift
        env:
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
      - run: npm run check:database-url
      - run: npm run build

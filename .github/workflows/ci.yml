name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run check:copilot-forms
      - name: Hardcoded color guard
        run: npm run check:hardcoded-colors
      - name: Layout rules guard
        run: npm run check:layout-rules
      - run: npm run check:migrations
      - run: npm run check:database-url
      - run: npm run build
